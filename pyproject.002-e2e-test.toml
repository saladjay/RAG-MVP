[project]
name = "e2e-test"
version = "0.1.0"
description = "E2E Test Framework for RAG Service validation"
requires-python = ">=3.11"
dependencies = [
    # Local modules
    "rag-service",
    # Web
    "httpx>=0.27.0",
    # Data validation
    "pydantic>=2.5.0",
    "pydantic-settings>=2.0.0",
    # File parsing
    "pyyaml>=6.0",
    # CLI
    "typer>=0.12.0",
    # Output
    "rich>=13.7.0",
    "jinja2>=3.1.0",
    # Logging
    "python-json-logger>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
]

[project.scripts]
e2e = "e2e_test.cli:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]

[tool.coverage.run]
source = ["src/e2e_test"]
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
